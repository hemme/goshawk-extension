<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoShawk</title>
  <style>
    :root {
      --bg: #f9f7f1;
      --fg: #1a1612;
      --muted: #6b563d;
      --accent: #c4956a;
      --card: #ffffff;
      --border: #dbcdb7;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--fg);
    }

    .header {
      position: relative;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 20px;
      text-align: center;
    }

    .header .icon {
      width: 48px;
      height: 48px;
      display: block;
      margin: 0 auto 6px auto;
      object-fit: contain;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .content {
      padding: 16px;
    }

    .btn-capture {
      width: 100%;
      padding: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--fg);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background-color 0.2s, border-color 0.2s, transform 0.1s;
    }

    .btn-capture:hover {
      background: var(--bg);
      border-color: var(--accent);
    }

    .btn-capture:active {
      transform: scale(0.98);
    }

    .btn-capture:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background: var(--card);
      border-color: var(--border);
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 14px 0;
    }

    .shortcut-hint {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .shortcut-hint span {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
    }

    .status {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      margin-top: 10px;
      min-height: 16px;
    }

    .status a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .status a:hover {
      text-decoration: underline;
    }

    .gear-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 4px;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gear-btn:hover,
    .gear-btn.active {
      color: var(--accent);
      background: rgba(196, 149, 106, 0.1);
    }

    .options-panel {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, margin 0.3s ease;
    }

    .options-panel.open {
      max-height: 400px;
      margin-top: 14px;
    }

    .options-content {
      padding: 12px 16px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .option-group {
      margin-bottom: 8px;
    }

    .option-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .option-label {
      font-size: 13px;
      font-weight: 500;
    }

    .option-hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .toggle {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: var(--border);
      border-radius: 20px;
      transition: background-color 0.2s;
    }

    .toggle-slider::before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 2px;
      bottom: 2px;
      background-color: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked+.toggle-slider {
      background-color: var(--accent);
    }

    .toggle input:checked+.toggle-slider::before {
      transform: translateX(16px);
    }

    .option-field {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }

    .option-field label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      min-width: 28px;
    }

    .option-field input[type="text"] {
      flex: 1;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 11px;
      background: var(--bg);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 5px 8px;
      outline: none;
      transition: border-color 0.2s;
      min-width: 0;
    }

    .option-field input[type="text"]:focus {
      border-color: var(--accent);
    }

    .option-field input[type="text"]::placeholder {
      color: var(--border);
    }

    .btn-reset-defaults {
      font-size: 11px;
      padding: 6px 10px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-reset-defaults:hover {
      border-color: var(--accent);
      color: var(--fg);
      background: rgba(196, 149, 106, 0.05);
    }
  </style>
</head>

<body>
  <div class="header">
    <button class="gear-btn" id="gearBtn" title="Options">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd"
          d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z"
          clip-rule="evenodd" />
      </svg>
    </button>
    <img src="icons/icon256.png" class="icon" alt="GoShawk">
    <h1>GoShawk</h1>
  </div>

  <div class="content">
    <button class="btn-capture" id="startCapture">
      <img src="icons/icon16.png" alt="" style="width:16px;height:16px;"> Capture goban
    </button>

    <div class="options-panel" id="optionsPanel">
      <div class="options-content">
        <div class="option-group">
          <div class="option-row">
            <span class="option-label">Remember parameters</span>
            <label class="toggle">
              <input type="checkbox" id="rememberParams" checked>
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="option-hint">Save tuning params per site on export</div>
        </div>
        <div class="divider"></div>
        <div class="option-group">
          <div class="option-label" style="margin-bottom: 8px;">Diagram viewer URLs</div>
          <div class="option-field">
            <label for="sgfViewerUrl">SGF</label>
            <input type="text" id="sgfViewerUrl" placeholder="https://...$sgf$...">
          </div>
          <div class="option-field">
            <label for="henViewerUrl">HEN</label>
            <input type="text" id="henViewerUrl" placeholder="https://...$hen$...">
          </div>
        </div>
        <div class="divider"></div>
        <div style="display: flex; justify-content: flex-end;">
          <button id="resetDefaultsBtn" class="btn-reset-defaults">Reset to defaults</button>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="shortcut-hint">
      <span id="hintText">💡 Click the button, then drag to select the area to capture</span>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script src="platform-strategies.js"></script>
  <script src="popup.js"></script>
</body>

</html>
